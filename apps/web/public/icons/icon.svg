<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0B1A2B"/>

  <!-- Glow effect -->
  <circle cx="256" cy="280" r="160" fill="#10B981" opacity="0.08"/>

  <g transform="translate(256,256) scale(3.2) translate(-64,-64)">
    <!-- Bottom stone — widest, with mountain peaks -->
    <path d="M8 48c0-3 2-6 5-7h38c3 1 5 4 5 7 0 4-3 7-7 7H15c-4 0-7-3-7-7z" fill="#10B981" opacity="0.85"/>
    <!-- Mountain silhouette inside bottom stone -->
    <path d="M14 52l8-10 4 4 6-7 5 6 3-3 8 10H14z" fill="#10B981" opacity="0.25"/>

    <!-- Middle stone -->
    <path d="M16 37c0-3 3-6 6-6h20c3 0 6 3 6 6s-3 6-6 6H22c-3 0-6-3-6-6z" fill="#10B981" opacity="0.75"/>

    <!-- Top stone — smallest -->
